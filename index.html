<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gin Rummy Pro</title>
    <style>
        :root { --bg: #fff; --text: #333; --accent: #007bff; }
        .dark-mode { --bg: #121212; --text: #f0f0f0; --accent: #375a7f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; transition: 0.3s; }
        .card { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .dark-mode .card { background: #222; }
        .input-row { display: flex; gap: 10px; height: 60px; margin: 20px 0; }
        .input-row input { flex: 1; height: 100%; font-size: 18px; padding: 0 10px; box-sizing: border-box; }
        .input-row button { flex: 0 0 80px; height: 100%; font-size: 20px; font-weight: bold; background: var(--accent); color: white; border: none; border-radius: 5px; }
        .danger { background: #dc3545 !important; margin-top: 10px; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ccc; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <h2>Gin Rummy</h2>
    
    <div class="card" style="text-align: center; font-weight: bold;">
        Vinster: <span id="lbl1">P1</span>: <span id="wins1">0</span> | <span id="lbl2">P2</span>: <span id="wins2">0</span>
    </div>

    <details>
        <summary>⚙️ Inställningar</summary>
        <div class="card">
            <input type="text" id="name1" placeholder="Namn 1" oninput="saveSettings()" style="width:45%">
            <input type="text" id="name2" placeholder="Namn 2" oninput="saveSettings()" style="width:45%">
            <br>
            <label>Vinstpoäng: </label>
            <input type="number" id="winScore" value="100" oninput="saveSettings()" style="width: 60px;">
            <button class="danger" onclick="resetStats()">Nollställ statistik</button>
            <button class="danger" onclick="resetGame()">Nollställ match</button>
        </div>
    </details>

    <div class="input-row">
        <input type="number" pattern="\d*" id="score1" placeholder="P1">
        <input type="number" pattern="\d*" id="score2" placeholder="P2">
        <button onclick="addRound()">+</button>
    </div>

    <h3>Total: <span id="t1">0</span> - <span id="t2">0</span></h3>

    <table>
        <thead><tr><th>Runda</th><th id="th1">P1</th><th id="th2">P2</th></tr></thead>
        <tbody id="history"></tbody>
    </table>

    <script>
        let rounds = JSON.parse(localStorage.getItem('gr_rounds')) || [];

        function updateUI() {
            const n1 = localStorage.getItem('name1') || 'P1';
            const n2 = localStorage.getItem('name2') || 'P2';
            document.getElementById('lbl1').innerText = n1;
            document.getElementById('lbl2').innerText = n2;
            document.getElementById('th1').innerText = n1;
            document.getElementById('th2').innerText = n2;
            document.getElementById('name1').value = n1;
            document.getElementById('name2').value = n2;
            document.getElementById('winScore').value = localStorage.getItem('winScore') || 100;
            document.getElementById('wins1').innerText = localStorage.getItem('wins1') || 0;
            document.getElementById('wins2').innerText = localStorage.getItem('wins2') || 0;

            const history = document.getElementById('history');
            history.innerHTML = '';
            let s1 = 0, s2 = 0;
            rounds.forEach((r, i) => {
                s1 += r.p1; s2 += r.p2;
                history.innerHTML += `<tr><td>${i+1}</td><td>${r.p1}</td><td>${r.p2}</td></tr>`;
            });
            document.getElementById('t1').innerText = s1;
            document.getElementById('t2').innerText = s2;
        }

        function addRound() {
            const p1 = parseInt(document.getElementById('score1').value) || 0;
            const p2 = parseInt(document.getElementById('score2').value) || 0;
            rounds.push({p1, p2});
            localStorage.setItem('gr_rounds', JSON.stringify(rounds));
            
            let s1 = rounds.reduce((sum, r) => sum + r.p1, 0);
            let s2 = rounds.reduce((sum, r) => sum + r.p2, 0);
            const target = parseInt(localStorage.getItem('winScore')) || 100;

            if (s1 >= target || s2 >= target) {
                if (s1 > s2) localStorage.setItem('wins1', parseInt(localStorage.getItem('wins1') || 0) + 1);
                else localStorage.setItem('wins2', parseInt(localStorage.getItem('wins2') || 0) + 1);
                
                if (confirm("Match slut! Vill du starta nästa?")) {
                    rounds = [];
                    localStorage.setItem('gr_rounds', '[]');
                }
            }
            document.getElementById('score1').value = '';
            document.getElementById('score2').value = '';
            updateUI();
        }

        function saveSettings() {
            localStorage.setItem('name1', document.getElementById('name1').value);
            localStorage.setItem('name2', document.getElementById('name2').value);
            localStorage.setItem('winScore', document.getElementById('winScore').value);
            updateUI();
        }

        function resetStats() {
            if (confirm("Nollställa vinster?")) {
                localStorage.setItem('wins1', '0');
                localStorage.setItem('wins2', '0');
                updateUI();
            }
        }

        function resetGame() {
            if (confirm("Nollställa matchen?")) {
                rounds = [];
                localStorage.setItem('gr_rounds', '[]');
                updateUI();
            }
        }

        updateUI();
    </script>
</body>

        }

        .input-row input {
            flex: 1; /* Gör att fälten delar lika på utrymmet */

            font-size: 18px; /* Större text i fälten */
            padding: 0 10px;
        }
    
        .input-row button {
            flex: 0 0 80px; /* Knappen blir fast 80px bred */

<body>

    <h2>Gin Rummy</h2>

    <details>
        <summary>⚙️ Inställningar</summary>
        <div class="card">
            <input type="text" id="name1" placeholder="Namn 1" oninput="saveSettings()">
            <input type="text" id="name2" placeholder="Namn 2" oninput="saveSettings()">
            <br>
            <label>Vinstpoäng: </label>
            <input type="number" id="winScore" value="100" oninput="saveSettings()" style="width: 60px;">
            <br>
            <button onclick="toggleDarkMode()">Tema</button>
            <button class="danger" onclick="resetGame()">Nollställ allt</button>
        </div>
    </details>

    <div class="input-row">
        <input type="number" pattern="\d*" id="score1" placeholder="P1">
        <input type="number" pattern="\d*" id="score2" placeholder="P2">
        <button onclick="addRound()">+</button>
    </div>

    <h3>Total: <span id="t1">0</span> - <span id="t2">0</span></h3>

    <table>
        <thead><tr><th>Runda</th><th id="lbl1">P1</th><th id="lbl2">P2</th></tr></thead>
        <tbody id="history"></tbody>
    </table>

    <script>
        let rounds = JSON.parse(localStorage.getItem('gr_rounds')) || [];
        
        function updateUI() {
            document.getElementById('name1').value = localStorage.getItem('name1') || 'Spelare 1';
            document.getElementById('name2').value = localStorage.getItem('name2') || 'Spelare 2';
            document.getElementById('winScore').value = localStorage.getItem('winScore') || 100;
            document.getElementById('lbl1').innerText = document.getElementById('name1').value;
            document.getElementById('lbl2').innerText = document.getElementById('name2').value;

            if(localStorage.getItem('dark') === 'true') document.body.classList.add('dark-mode');

            const history = document.getElementById('history');
            history.innerHTML = '';
            let s1 = 0, s2 = 0;
            rounds.forEach((r, i) => {
                s1 += r.p1; s2 += r.p2;
                history.innerHTML += `<tr><td>${i+1}</td><td>${r.p1}</td><td>${r.p2}</td></tr>`;
            });
            document.getElementById('t1').innerText = s1;
            document.getElementById('t2').innerText = s2;

            const target = parseInt(localStorage.getItem('winScore')) || 100;
            if(s1 >= target || s2 >= target) alert("Spelet är slut!");
            document.getElementById('score1').placeholder = `Poäng för ${localStorage.getItem('name1') || 'Spelare 1'}`;
            document.getElementById('score2').placeholder = `Poäng för ${localStorage.getItem('name2') || 'Spelare 2'}`;
        }

        function addRound() {
            const p1 = parseInt(document.getElementById('score1').value) || 0;
            const p2 = parseInt(document.getElementById('score2').value) || 0;
            rounds.push({p1, p2});
            localStorage.setItem('gr_rounds', JSON.stringify(rounds));
            document.getElementById('score1').value = '';
            document.getElementById('score2').value = '';
            updateUI();
        }

        function saveSettings() {
            const n1 = document.getElementById('name1').value || 'Spelare 1';
            const n2 = document.getElementById('name2').value || 'Spelare 2';
            
            localStorage.setItem('name1', n1);
            localStorage.setItem('name2', n2);
            localStorage.setItem('winScore', document.getElementById('winScore').value);
            
            // Uppdatera etiketter
            document.getElementById('lbl1').innerText = n1;
            document.getElementById('lbl2').innerText = n2;
            
            // Uppdatera placeholders i poängfälten
            document.getElementById('score1').placeholder = `Poäng för ${n1}`;
            document.getElementById('score2').placeholder = `Poäng för ${n2}`;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark', document.body.classList.contains('dark-mode'));
        }

        function resetGame() {
            if(confirm("Vill du nollställa allt?")) {
                rounds = [];
                localStorage.setItem('gr_rounds', '[]');
                updateUI();
            }
        }

        updateUI();
    </script>
